<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta
      name="description"
      content="Haroon Ameer Khan — Full-Stack Developer (MERN). Portfolio showcasing projects, certificates, and tech stack."
    />
    <meta name="author" content="Haroon Ameer Khan" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Haroon Ameer Khan — Full-Stack Developer" />
    <meta property="og:description" content="MERN stack developer. Portfolio showcasing projects, certificates, and tech stack." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://realmrhak-portfolio.vercel.app/" />
    <meta property="og:image" content="/assets/haroon-profile.png" />
    <meta property="og:image:alt" content="Haroon Ameer Khan — Full-Stack Developer" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Haroon Ameer Khan — Full-Stack Developer" />
    <meta name="twitter:description" content="MERN stack developer. Portfolio showcasing projects, certificates, and tech stack." />
    <meta name="twitter:image" content="/assets/haroon-profile.png" />

    <title>Haroon Ameer Khan — Full-Stack Developer</title>

    <!-- Preconnect to Google Fonts (DNS + TLS warmup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload critical font CSS (render-blocking otherwise) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Poppins:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Poppins:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Hint the browser to start DNS/TLS handshakes to the API origin early -->
    <link rel="preconnect" href="https://portfolio-backend-xxxx.onrender.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
